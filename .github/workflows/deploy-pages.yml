name: Deploy to GitHub Pages

# Builds the static SPA and publishes it to the `gh-pages` branch, which GitHub
# Pages serves (Settings → Pages → Source: "Deploy from a branch: gh-pages /").
#
# We push to a branch (peaceiris) rather than use actions/deploy-pages, whose
# Pages-deployment API step is prone to "Timeout reached, aborting" and can
# leave the site serving an index.html whose hashed assets 404.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write   # to push the gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: false   # never cancel a deploy mid-flight

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install && npm run build:pages
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # peaceiris adds .nojekyll automatically (Jekyll stays off).
